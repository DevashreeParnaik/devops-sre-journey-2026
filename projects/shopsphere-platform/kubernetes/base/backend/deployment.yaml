apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsphere-backend
spec:
  selector:
    matchLabels:
      app: shopsphere-backend
  replicas: 1
  template:
    metadata:
      labels:
        app: shopsphere-backend
    spec:
      containers:
      - name: shopsphere-backend
        image: shopsphere-backend:dev
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8000
        env:
            - name: DB_HOST
              value: postgres-service

            - name: DB_PORT
              value: "5432"
