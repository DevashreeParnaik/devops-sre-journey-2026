apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: minio

spec:
  serviceName: minio-service

  replicas: 1

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      containers:
        - name: minio

          image: minio/minio:latest

          args:
            - server
            - /data
            - --console-address
            - ":9001"

          ports:
            - containerPort: 9000
            - containerPort: 9001

          envFrom:
            - secretRef:
                name: minio-secret

          volumeMounts:
            - name: minio-storage
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: minio-storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: local-path

        resources:
          requests:
            storage: 10Gi